<html>
    <head>
        <title>Calculator</title>
    </head>
    <body>
        <h1 style="text-align: center;">CALCULATOR</h1>
        <div style="text-align: center;">
            <input type="number" id="num1" oninput="myfunction()" placeholder="Enter The Number 1">
            <input type="number" id="num2" oninput="myfunction()" placeholder="Enter The Number 2">
            <br><br>
            <button onclick="calculate('+')">ADD</button>
            <button onclick="calculate('-')">SUBTRACT</button>
            <button onclick="calculate('*')">MULTIPLY</button>
            <button onclick="calculate('/')">DIVIDE</button>
            <button onclick="bgred()">RED</button>
            <button onclick="bgblue()">BLUE</button>
            <button onclick="document.body.style.backgroundColor='yellow'">YELLOW</button>
        </div>
        <h1 id="RESULT" style="text-align: center;"></h1>
    </body>
    <script>
        function calculate(operator) {
            const num1 = parseFloat(document.getElementById('num1').value);
            const num2 = parseFloat(document.getElementById('num2').value);
            let result;

            switch (operator) {
                case '+':
                    result = num1 + num2;
                    break;
                case '-':
                    result = num1 - num2;
                    break;
                case '*':
                    result = num1 * num2;
                    break;
                case '/':
                    if (num2 !== 0) {
                        result = num1 / num2;
                    } else {
                        result = 'Error: Division by zero';
                    }
                    break;
                default:
                    result = 'Invalid operator';
            }

            document.getElementById('RESULT').textContent = `Result: ${result}`;
        }
        function myfunction() {
            const num1 = document.getElementById('num1').value;
            const num2 = document.getElementById('num2').value;
            if((num1 >=99 || num2 >=99)){
                alert("Number should be less than 100");
            }
        }
        function bgred(){
            document.body.style.backgroundColor = "red";
        }
        function bgblue(){
            document.body.style.backgroundColor = "blue";
        }
    </script>
</html>
